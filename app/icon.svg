    <path d="M394 126l8 18 18 8-18 8-8 18-8-18-18-8 18-8 8-18z" opacity="0.9"/>
    <path d="M128 164l6 14 14 6-14 6-6 14-6-14-14-6 14-6 6-14z" opacity="0.65"/>
    <path d="M156 392l7 16 16 7-16 7-7 16-7-16-16-7 16-7 7-16z" opacity="0.5"/>
  </g>
</svg>
