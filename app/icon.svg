    <!-- Hat brim -->
    <path d="M140 320c32 26 200 26 232 0" />
    <path d="M132 332c40 36 224 36 264 0" opacity="0.85" />

    <!-- Hat body -->
    <path d="M190 320V208c0-18 14-32 32-32h68c18 0 32 14 32 32v112" />
    <path d="M190 232h164" opacity="0.65" />

    <!-- Wand (diagonal) -->
