<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Magician Essen favicon">
  <rect width="512" height="512" rx="112" fill="#14141c"/>

  <!-- 45° wand (high contrast, premium silver) -->
  <defs>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#e5e7eb"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>

  <g transform="translate(256 256) rotate(-35) translate(-256 -256)">
    <!-- Wand body -->
    <rect x="132" y="242" width="260" height="28" rx="14" fill="url(#silver)"/>
    <!-- Wand handle wrap -->
    <rect x="132" y="242" width="96" height="28" rx="14" fill="#94a3b8" opacity="0.55"/>
    <path d="M158 242v28M186 242v28M214 242v28" stroke="#0b0b10" stroke-opacity="0.28" stroke-width="6" stroke-linecap="round"/>

    <!-- Wand tip -->
    <circle cx="404" cy="256" r="10" fill="#f8fafc"/>
    <circle cx="404" cy="256" r="18" fill="#f8fafc" opacity="0.12"/>
  </g>

  <!-- Sparkles near the tip -->
  <g fill="#f8fafc" opacity="0.9">
    <path d="M396 142l8 18 18 8-18 8-8 18-8-18-18-8 18-8 8-18z"/>
  </g>
  <g fill="#cbd5e1" opacity="0.65">
    <path d="M120 180l6 14 14 6-14 6-6 14-6-14-14-6 14-6 6-14z"/>
  </g>
</svg>
